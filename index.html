<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairytopia Battle Game | The Final Duel</title>
    
    <!-- P5.js & ML5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.6.0/dist/ml5.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <!-- Firebase (Compat v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@400;700&family=Caveat:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #50fa7b;
            --secondary: #f1fa8c;
            --accent: #ff79c6;
            --background: #0a050f;
            --glass: rgba(26, 8, 48, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--background);
            background-image: url('fairy_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        .auth-box {
            background: #111; padding: 40px; border-radius: 30px; border: 2px solid var(--accent);
            text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 50px rgba(255, 121, 198, 0.2);
        }

        .auth-box input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; box-sizing: border-box;
        }

        .btn-primary {
            padding: 12px 24px; border-radius: 12px; background: var(--accent);
            color: white; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; width: 100%;
            margin-top: 10px;
        }

        #p5-container {
            margin-top: 30px; border: 10px solid var(--accent); border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 121, 198, 0.3); overflow: hidden; background: black;
        }

        #controls-container {
            width: 100%; max-width: 800px; margin-top: 20px; display: flex; flex-direction: column; align-items: center;
        }

        #mirrors-gallery {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; width: 100%; max-width: 1200px; padding: 40px;
            opacity: 0; transition: opacity 1s; height: 0; overflow: hidden;
        }

        .mirror-frame {
            background: var(--glass); border: 2px solid var(--accent); padding: 10px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .fly-in { animation: flyIn 0.8s ease-out forwards; }
        @keyframes flyIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h1 { font-family: 'Cinzel Decorative', cursive; margin-top: 20px; letter-spacing: 4px; text-shadow: 0 0 20px var(--accent); }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff79c6; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; z-index: 2000;
        }
    </style>
    <script>
        console.log("Fairy Filter Booting...");
        window.onerror = function(msg, url, line) {
            console.error("Magical Error: " + msg + " at " + line);
        };
    </script>
</head>
<body>
    <div id="loading-screen">✨ Awakening the Arena...</div>

    <div id="login-overlay">
        <div class="auth-box">
            <h1>Fairytopia</h1>
            <p style="opacity: 0.6; margin-bottom: 20px;">The Battle Game</p>
            <input type="email" id="auth-email" placeholder="Magical Email">
            <input type="password" id="auth-password" placeholder="Secret Password">
            <button class="btn-primary" onclick="window.loginWithEmail()">ENTER ARENA</button>
            <p style="font-size: 0.8rem; margin-top: 15px; opacity: 0.5;">Enter email/password. New spirits will be registered automatically.</p>
        </div>
    </div>

    <h1>Fairytopia Battle</h1>
    <div id="p5-container"></div>
    <div id="controls-container"></div>

    <div id="mirrors-gallery">
        <!-- Remote players appear here -->
    </div>

    <script src="sketch.js"></script>
</body>
</html>
