<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fairytopia: Solo Mirror</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Quicksand:wght@400;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #ff00ff;
      --secondary: #00ffff;
      --bg-dark: #0f051a;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      background-image: url('../fairy_bg.png'); /* Shared background */
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      width: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    h1 {
      font-family: 'Cinzel Decorative', cursive;
      font-size: clamp(2.5rem, 8vw, 4rem);
      margin: 0;
      color: #fff;
      text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary);
      letter-spacing: 4px;
    }

    .instructions {
      margin: 20px auto;
      max-width: 600px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .instruction-step {
      font-size: 1.2rem;
      margin: 0;
      color: #ffccff;
      text-align: center;
      line-height: 1.5;
    }

    #canvas-container {
      position: relative;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      padding: 12px;
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(255, 0, 255, 0.4);
      margin: 20px 0;
      transition: transform 0.3s ease;
    }

    #canvas-container:hover {
      transform: scale(1.01);
    }

    canvas {
      display: block;
      border-radius: 12px;
      background-color: #000;
    }

    #controls-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 50px;
    }

    .fly-in {
      animation: flyIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes flyIn {
      from { opacity: 0; transform: translateY(20px) scale(0.9); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Fairytopia Solo</h1>
    <div class="instructions">
      <p id="instr-1" class="instruction-step fly-in">Create your fairy name to enter the mirror.</p>
      <p id="instr-2" class="instruction-step" style="display: none;">Type your magical item below and turn it into your wand.</p>
      <p id="instr-3" class="instruction-step" style="display: none;"><b>THE TRANSFORMATION</b><br>Shake your hand rapidly to reveal your true Fairy Form!</p>
    </div>
  </header>
  
  <div id="canvas-container">
    <div id="p5-container"></div>
  </div>

  <div id="controls-container"></div>
  
  <script src="sketch.js"></script>
</body>
</html>
